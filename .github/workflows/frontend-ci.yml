name: Frontend CI

# mainブランチへのPRで src/frontend/ 配下に変更があった場合のみ実行
on:
  pull_request:
    branches: [main]
    paths: ["src/frontend/**"]

# 同一ブランチ・同一ワークフローの実行が重複した場合、古い実行をキャンセルして最新のみ実行する
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ジョブ1: コード品質チェック
  # Lint と型チェックを先に実行し、問題があれば後続ジョブを走らせない
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          # package-lock.json を元にキャッシュキーを生成し、依存関係のインストールを高速化
          cache-dependency-path: "src/frontend/package-lock.json"

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint
        working-directory: src/frontend
        # ESLint で src/ 配下のコードスタイル・静的解析を実行
        run: npm run lint

      - name: Type check
        working-directory: src/frontend
        # tsc --noEmit で型エラーのみチェック（出力ファイルは生成しない）
        run: npm run type-check

  # ジョブ2: テストとビルド
  # lint-and-typecheck が成功した場合のみ実行（needs による直列化）
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: "src/frontend/package-lock.json"

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run tests
        working-directory: src/frontend
        # vitest run で全テストを実行
        # GITHUB_ACTIONS 環境変数が存在する場合、github-actions レポーターが有効になり
        # テスト失敗箇所が PR のアノテーションとして表示される（vite.config.ts 参照）
        run: npm run test

      - name: Build
        working-directory: src/frontend
        # npm run build (tsc && vite build) の代わりに vite build を直接実行
        # 型チェックは lint-and-typecheck ジョブで完結しているため tsc の二重実行を避ける
        run: npx vite build
