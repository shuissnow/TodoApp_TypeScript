name: Backend CI

on:
  # ✅ 改善1: PRトリガーを追加 → mainへのPR作成・更新時にもCIが走る
  pull_request:
    branches:
      - main
    paths:
      - "src/backend/**"
  push:
    branches:
      - main
    paths:
      - "src/backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          # lockファイルをキーにすることで、依存関係が変わった場合のみキャッシュを再生成
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys:
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: src/backend/tests/TodoApp.Api.Tests
        run: dotnet restore TodoApp.sln

      - name: Build
        working-directory: src/backend
        run: dotnet build TodoApp.sln --no-restore --configuration Release

      - name: Run tests
        working-directory: src/backend
        run: |
          dotnet test TodoApp.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() # テストが失敗しても必ずアップロードする
        with:
          name: test-results
          path: ./test-results/**/*.trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./test-results/**/coverage.cobertura.xml